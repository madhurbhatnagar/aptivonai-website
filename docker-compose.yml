services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-assistant-api
    env_file:
      - .env
    environment:
      LLM_API_BASE_URL: http://host.docker.internal:11434/v1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-assistant-frontend
    env_file:
      - .env
    environment:
      BACKEND_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped
